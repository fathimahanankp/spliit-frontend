<!DOCTYPE html>
<html>
<head>
  <title>Spliit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>💸 Spliit</h1>

<!-- AUTH -->
<div class="card">
  <h2>🔐 Auth</h2>
  <input id="name" placeholder="Name">
  <input id="password" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- GROUP -->
<div class="card">
  <h2>👥 Groups</h2>
  <input id="groupName" placeholder="Group name">
  <input id="members" placeholder="Members (a,b,c)">
  <button onclick="createGroup()">Create</button>

  <select id="groups"></select>
  <button onclick="loadGroup()">Load</button>
</div>

<!-- EXPENSE -->
<div class="card">
  <h2>💰 Expense</h2>
  
  <input id="amount" type="number" placeholder="Amount">

  <label>Paid By:</label>
  <select id="paidBy"></select>

  <label>Split Between:</label>
  <div id="splitUsers"></div>

  <button onclick="addExpense()">Add</button>
</div>

<!-- BALANCES -->
<div class="card">
  <h2>📊 Balances</h2>
  <div id="balances"></div>
</div>

<!-- WHO OWES -->
<div class="card">
  <h2>🤝 Who Owes</h2>
  <table id="owesTable">
    <thead>
      <tr>
        <th>From</th>
        <th></th>
        <th>To</th>
        <th>Amount</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- EXPENSE HISTORY -->
<div class="card">
  <h2>🧾 Expenses</h2>
  <div id="expensesList"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
